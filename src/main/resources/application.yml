spring:
  application:
    name: cargo-iq
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ---------------------------------------------------------------------------
  # Postgres + pgvector. Same database, two consumers:
  #   * JPA / Flyway for the `documents` table
  #   * Spring AI PgVectorStore for the `vector_store` table
  # ---------------------------------------------------------------------------
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/cargoiq}
    username: ${POSTGRES_USER:cargoiq}
    password: ${POSTGRES_PASSWORD:cargoiq}
  jpa:
    hibernate:
      ddl-auto: validate         # Flyway owns the schema, not Hibernate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # ---------------------------------------------------------------------------
  # Spring AI — model + vector store + MCP server
  # ---------------------------------------------------------------------------
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}
          temperature: 0.1
      embedding:
        options:
          model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}

    vectorstore:
      pgvector:
        # The starter manages schema for us; pinning here for transparency.
        # Dimensions MUST match the embedding model. text-embedding-3-small = 1536.
        dimensions: 1536
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        initialize-schema: true
        schema-name: public
        table-name: vector_store

    mcp:
      server:
        # ---------------------------------------------------------------------
        # Streamable HTTP transport (current MCP spec, replaces older SSE).
        # Endpoint: POST /mcp
        # ---------------------------------------------------------------------
        protocol: STREAMABLE
        name: cargo-iq
        version: 0.1.0
        instructions: >
          cargo-iq exposes RAG + reference-lookup capabilities for international
          cargo, freight, and trade-finance documents. Use search_cargo_documents
          for free-form questions about ingested shipments; use lookup_incoterm
          and lookup_hs_code for deterministic reference data. Summarize_shipment
          works on a single known document ID.
        capabilities:
          tool: true
          resource: true       # stubbed; see adapter/in/mcp/resources
          prompt: true         # stubbed; see adapter/in/mcp/prompts
          completion: false

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  swagger-ui:
    path: /swagger
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    org.springframework.ai: INFO
    io.cargoiq: INFO
