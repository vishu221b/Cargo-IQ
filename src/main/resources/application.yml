spring:
  application:
    name: cargo-iq
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ---------------------------------------------------------------------------
  # The Google GenAI starter is on the classpath so Gemini *chat* is selectable
  # at runtime (spring.ai.model.chat=google-genai). Its *embedding* autoconfigs,
  # however, misbehave when Gemini isn't the active embedding provider:
  #   - GoogleGenAiTextEmbeddingAutoConfiguration uses its own selector
  #     (spring.ai.model.embedding.text) with matchIfMissing=true, so it would
  #     create a SECOND EmbeddingModel bean and break pgvector wiring; and
  #   - GoogleGenAiEmbeddingConnectionAutoConfiguration is gated only by
  #     @ConditionalOnClass and builds the Google client at startup (throws
  #     IOException), so it runs even when Gemini is unused.
  # Exclude both by default; the `gemini` profile lifts this to use Gemini
  # embeddings end to end. OpenAI / Anthropic / Ollama have no such quirk.
  autoconfigure:
    exclude:
      - org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiEmbeddingConnectionAutoConfiguration
      - org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiTextEmbeddingAutoConfiguration
      # cargo-iq uses only chat + embedding. The OpenAI starter also ships audio,
      # image and moderation autoconfigs that activate by default (matchIfMissing)
      # and hard-require an API key at startup — which would break the zero-key
      # mock default. We don't use them, so exclude them.
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration

  # ---------------------------------------------------------------------------
  # Postgres + pgvector. Same database, two consumers:
  #   * JPA / Flyway for the `documents` table
  #   * Spring AI PgVectorStore for the `vector_store` table
  # ---------------------------------------------------------------------------
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/cargoiq}
    username: ${POSTGRES_USER:cargoiq}
    password: ${POSTGRES_PASSWORD:cargoiq}
  jpa:
    hibernate:
      ddl-auto: validate         # Flyway owns the schema, not Hibernate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # Uploaded documents (PDF/DOCX/…) can be a few MB; lift the tiny defaults.
  servlet:
    multipart:
      max-file-size: ${MAX_UPLOAD_SIZE:25MB}
      max-request-size: ${MAX_UPLOAD_SIZE:25MB}

  # ---------------------------------------------------------------------------
  # Spring AI — models + vector store + MCP server
  #
  # Four providers are on the classpath; exactly one chat provider and one
  # embedding provider are active, selected here. Defaults to OpenAI. To run
  # fully locally with no API keys, activate the `ollama` profile (see
  # application-ollama.yml) — it flips both selectors to ollama.
  #
  # NOTE: the pgvector column dimension MUST match whatever the *active*
  # embedding model emits, so it is parameterised below (VECTOR_DIMENSIONS).
  # Switching embedding providers means re-indexing — the dimensions differ
  # (OpenAI 3-small = 1536, Gemini text-embedding-004 = 768, Ollama
  # nomic-embed-text = 768). Anthropic has no embedding model, so pair it with
  # one of the others for `spring.ai.model.embedding`.
  # ---------------------------------------------------------------------------
  ai:
    # Defaults to a dependency-free MOCK so the app runs with NO API key and NO
    # local model server (mock chat via ChatModelRouter + MockEmbeddingModel).
    #   * chat:      mock | openai | anthropic | google-genai | ollama
    #               (also selectable per-request from the UI — Ollama can take
    #                any pulled model, e.g. gemma2:9b)
    #   * embedding: none (-> mock) | openai | google-genai | ollama
    # Set AI_CHAT_PROVIDER / AI_EMBEDDING_PROVIDER (+ the matching key) to use a
    # real provider as the server default.
    model:
      chat: ${AI_CHAT_PROVIDER:mock}
      embedding: ${AI_EMBEDDING_PROVIDER:none}

    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}
          temperature: 0.1
      embedding:
        options:
          model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}

    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: ${ANTHROPIC_CHAT_MODEL:claude-sonnet-4-5}
          temperature: 0.1

    google:
      genai:
        api-key: ${GEMINI_API_KEY:}
        chat:
          options:
            model: ${GEMINI_CHAT_MODEL:gemini-2.5-flash}
            temperature: 0.1
        embedding:
          text:
            options:
              model: ${GEMINI_EMBEDDING_MODEL:text-embedding-004}

    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_CHAT_MODEL:llama3.1}
          temperature: 0.1
      embedding:
        options:
          model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}

    vectorstore:
      pgvector:
        # The starter manages schema for us; pinning here for transparency.
        # Dimensions MUST match the active embedding model (see note above).
        dimensions: ${VECTOR_DIMENSIONS:1536}
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        initialize-schema: true
        schema-name: public
        table-name: vector_store

    mcp:
      server:
        # ---------------------------------------------------------------------
        # Streamable HTTP transport (current MCP spec, replaces older SSE).
        # Endpoint: POST /mcp
        # ---------------------------------------------------------------------
        protocol: STREAMABLE
        name: cargo-iq
        version: 0.1.0
        instructions: >
          cargo-iq exposes RAG + reference-lookup capabilities for international
          cargo, freight, and trade-finance documents. Use search_cargo_documents
          for free-form questions about ingested shipments; use lookup_incoterm
          and lookup_hs_code for deterministic reference data. Summarize_shipment
          works on a single known document ID.
        capabilities:
          tool: true
          resource: true       # stubbed; see adapter/in/mcp/resources
          prompt: true         # stubbed; see adapter/in/mcp/prompts
          completion: false

# ---------------------------------------------------------------------------
# Application security — stateless JWT + RBAC (see SecurityConfig).
#   * jwt.secret    — HMAC-SHA256 signing key. MUST be >= 32 bytes and MUST be
#                     overridden via JWT_SECRET in any non-local environment.
#   * jwt.ttl       — token lifetime in seconds (default 1 hour).
#   * bootstrap-admin — only seeded under the `dev` profile (see DataInitializer).
# ---------------------------------------------------------------------------
cargoiq:
  security:
    jwt:
      secret: ${JWT_SECRET:change-me-in-prod-this-is-a-dev-only-secret-please}
      issuer: ${JWT_ISSUER:cargo-iq}
      ttl-seconds: ${JWT_TTL_SECONDS:3600}
    bootstrap-admin:
      username: ${BOOTSTRAP_ADMIN_USERNAME:admin}
      password: ${BOOTSTRAP_ADMIN_PASSWORD:admin12345}
  web:
    cors:
      # Comma-separated origins allowed to call the API from a browser.
      # Defaults to the Vite dev server; set CORS_ALLOWED_ORIGINS in prod.
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  swagger-ui:
    path: /swagger
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    org.springframework.ai: INFO
    io.cargoiq: INFO
