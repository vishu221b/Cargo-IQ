name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: build & test (jdk 21)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Show versions
        run: |
          java -version
          mvn -version

      - name: Build & test
        # Testcontainers needs Docker on the runner; ubuntu-latest has it.
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: mvn -B -ntp verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/'
          if-no-files-found: ignore

  docker:
    name: docker image build (smoke)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build container (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: cargo-iq:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
